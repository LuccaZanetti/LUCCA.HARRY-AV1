<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Madrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">Real Madrid</a>
        </div>
    </nav>

    <div class="bg-dark text-white text-center py-4">
        <h1>Real Madrid</h1>
        <p>O Clube Mais Vitorioso da Europa</p>
    </div>

    <div class="container py-4">
        <h2 class="mb-4">Elenco - 2025/26</h2>
        
        <div class="d-flex gap-2 justify-content-center mb-4">
            <span class="badge bg-warning">Goleiro</span>
            <span class="badge bg-danger">Defesa</span>
            <span class="badge bg-info">Meio-Campo</span>
            <span class="badge bg-success">Ataque</span>
        </div>

        <div id="loading" class="text-center">
            <p>Carregando...</p>
        </div>

        <div id="error" class="alert alert-danger d-none">
            <span id="errorMessage"></span>
        </div>

        <div id="playersContainer" class="row g-4"></div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">Real Madrid © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
