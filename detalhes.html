<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes - Real Madrid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">Real Madrid</a>
        </div>
    </nav>

    <div id="loading" class="container mt-5 text-center">
        <p>Carregando...</p>
    </div>

    <div id="error" class="container mt-5" style="display: none;">
        <div class="alert alert-danger">
            <span id="errorMessage"></span>
        </div>
        <a href="index.html" class="btn btn-primary">Voltar</a>
    </div>

    <div id="playerDetails" class="container my-5" style="display: none;">
        <div class="row">
            <div class="col-md-3">
                <img id="playerImage" src="" class="img-fluid rounded" alt="Jogador">
            </div>
            <div class="col-md-9">
                <h2 id="playerName"></h2>
                <p id="playerPosition" class="text-muted mb-3"></p>
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>Número:</strong> <span id="playerNumber">-</span></p>
                        <p><strong>Nacionalidade:</strong> <span id="playerNationality">-</span></p>
                        <p><strong>Altura:</strong> <span id="playerHeight">-</span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Nascimento:</strong> <span id="playerBirth">-</span></p>
                        <p><strong>Pé:</strong> <span id="playerFoot">-</span></p>
                        <p><strong>Idade:</strong> <span id="playerAge">-</span></p>
                    </div>
                </div>
                <hr>
                <h5>Estatísticas</h5>
                <p>Aparições: <span id="playerApearances">0</span> | Gols: <span id="playerGoals">0</span> | Assistências: <span id="playerAssists">0</span></p>
            </div>
        </div>
        <div class="mt-4">
            <a href="index.html" class="btn btn-primary">Voltar</a>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">Real Madrid © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/detalhes.js"></script>
</body>
</html>
